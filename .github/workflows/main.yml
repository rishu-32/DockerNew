name: BookStore DevOps CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build user-service with Maven
        working-directory: user-service
        run: mvn -B -DskipTests clean package

      - name: Build book-service with Maven
        working-directory: book-service
        run: mvn -B -DskipTests clean package

      - name: Build order-service with Maven
        working-directory: order-service
        run: mvn -B -DskipTests clean package

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Build Docker images
        run: docker compose build

      - name: Start application with Docker Compose
        run: docker compose up -d

      - name: Wait for services
        run: |
          sleep 30
          docker compose ps

      - name: Health check via Nginx
        run: |
          curl -f http://localhost/api/books || exit 1

      - name: Show DevOps workflow summary
        run: |
          echo "Developer Push Code"
          echo "        ↓"
          echo "GitHub Trigger Event"
          echo "        ↓"
          echo "GitHub Actions Pipeline"
          echo "        ↓"
          echo "Maven Build"
          echo "        ↓"
          echo "Docker Image Build"
          echo "        ↓"
          echo "Docker Compose Deployment"
          echo "        ↓"
          echo "Application Running"
