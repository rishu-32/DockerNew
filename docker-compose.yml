services:
  mongodb:
    image: mongo:7.0
    container_name: bookstore-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: bookstore
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bookstore-net

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: bookstore-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      MONGODB_URI: mongodb://mongodb:27017/bookstore
      JWT_SECRET: ${JWT_SECRET:-bookstore-devops-jwt-secret-key-2026-min-32-chars}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bookstore-net

  book-service:
    build:
      context: ./book-service
      dockerfile: Dockerfile
    container_name: bookstore-book-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      MONGODB_URI: mongodb://mongodb:27017/bookstore
      JWT_SECRET: ${JWT_SECRET:-bookstore-devops-jwt-secret-key-2026-min-32-chars}
    depends_on:
      mongodb:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - bookstore-net

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: bookstore-order-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      MONGODB_URI: mongodb://mongodb:27017/bookstore
      JWT_SECRET: ${JWT_SECRET:-bookstore-devops-jwt-secret-key-2026-min-32-chars}
    depends_on:
      mongodb:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - bookstore-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookstore-frontend-build
    volumes:
      - frontend_static:/output
    networks:
      - bookstore-net

  nginx:
    image: nginx:1.25-alpine
    container_name: bookstore-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_static:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - user-service
      - book-service
      - order-service
    networks:
      - bookstore-net

volumes:
  mongo_data:
  frontend_static:

networks:
  bookstore-net:
    driver: bridge
